name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@224ba4e3e8e2bd8b5d37ad99a7ae4f7cfebb6e5c  # 2.0.0
        with:
          severity: warning
          scandir: .
